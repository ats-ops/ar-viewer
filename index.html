<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D骨図鑑</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 上バー -->
<header class="topbar">
  🦴 3D骨図鑑（閲覧モード）
</header>

<!-- 左：部位ボタン -->
<div id="panel" class="sidebar"></div>

<!-- 右：標本情報 -->
<div id="specimen" class="specimen-card">
  <h3>標本情報</h3>

  <table>
    <tr>
      <th>標本名</th>
      <td>ヒグマ頭骨</td>
    </tr>

    <tr>
      <th>取得方法</th>
      <td>3Dスキャン（Revo Scan）</td>
    </tr>

    <tr>
      <th>形式</th>
      <td>GLB</td>
    </tr>

    <tr>
      <th>用途</th>
      <td>教育・閲覧</td>
    </tr>
  </table>
</div>

<!-- 下：説明 -->
<div id="info" class="info-card">
  部位を選択してください
</div>

<!-- 3Dモデル -->
<model-viewer
  id="viewer"
  src="model.glb"

  camera-controls
  ar

  exposure="0.55"
  shadow-intensity="1.2"
  environment-image="neutral"
  tone-mapping="neutral"

  style="width:100vw; height:100vh;"
>
</model-viewer>

<script src="viewer.js"></script>

</body>

</html>
