<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D骨図鑑UI</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">
  🦴 ヒグマ頭骨インタラクティブ図鑑
</header>

<main>

<!-- 左メニュー -->
<div class="sidebar">
  <h3>部位一覧</h3>

  <button onclick="showInfo('頭頂部')">頭頂部</button>
  <button onclick="showInfo('下顎')">下顎</button>
  <button onclick="showInfo('眼窩')">眼窩</button>
</div>

<!-- 3D -->
<model-viewer
  id="viewer"
  src="model.glb"
  camera-controls
  auto-rotate
  ar
  shadow-intensity="1"
  style="width:100vw; height:80vh;"
>
</model-viewer>

<!-- 説明カード（固定） -->
<div id="infoCard" class="info-card">
  部位を選択してください
</div>

<!-- ARボタン -->
<button class="ar-btn" onclick="document.getElementById('viewer').activateAR()">
📱 AR起動
</button>

</main>

<script src="viewer.js"></script>

</body>

</html>
