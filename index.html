<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Viewer（model-viewer版）</title>

<link rel="stylesheet" href="style.css">

<!-- model-viewer -->
<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

</head>

<body>

<header>
  <h1>3Dモデルビューアー</h1>
</header>

<main>

  <model-viewer
    id="viewer"
    src="model.glb"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    rotation-per-second="12deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="0.8"
    ar
    ar-modes="webxr scene-viewer quick-look"
    loading="eager"
    reveal="auto"
    style="width:100vw; height:80vh;"
  ></model-viewer>

</main>

<footer>

  <p>ドラッグで回転 / スマホでAR対応</p>

</footer>

<script src="viewer.js"></script>

</body>

</html>
