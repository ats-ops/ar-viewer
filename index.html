<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>骨モデルUI</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">
  <h1>🐻 ヒグマ頭骨（クリック説明付き）</h1>
</header>

<main>

<model-viewer
  id="viewer"
  src="model.glb"
  camera-controls
  auto-rotate
  ar
  shadow-intensity="1"
  style="width:100vw; height:80vh;"

>

  <!-- 🧠 ホットスポット①（頭頂） -->
  <button class="hotspot"
    slot="hotspot-top"
    data-position="0 0.15 0"
    data-normal="0 1 0"
    data-visibility-attribute="visible"
    data-info="頭頂部：頭蓋骨の最上部。脳を保護する重要部分。">
    ●
  </button>

  <!-- 🧠 ホットスポット②（顎） -->
  <button class="hotspot"
    slot="hotspot-jaw"
    data-position="0 -0.1 0.2"
    data-normal="0 -1 0"
    data-info="下顎：咀嚼を行う主要な骨。筋肉付着が強い。">
    ●
  </button>

</model-viewer>

<!-- 説明ポップアップ -->
<div id="popup" class="popup hidden"></div>

</main>

<script src="viewer.js"></script>

</body>

</html>
