<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D図鑑エディタ</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">
  🦴 3D図鑑エディタ（編集＋AR対応）
</header>

<div class="sidebar">
  <h3>操作</h3>

  <button onclick="toggleEditMode()">🛠 編集モード</button>
  <button onclick="clearPins()">🗑 ピン削除</button>
  <button onclick="document.getElementById('viewer').activateAR()">📱 AR起動</button>
</div>

<model-viewer
  id="viewer"
  src="model.glb"

  camera-controls
  auto-rotate="false"

  ar
  ar-modes="webxr scene-viewer quick-look"

  exposure="0.7"
  shadow-intensity="0.8"
  tone-mapping="neutral"

  style="width:100vw; height:85vh;"
>
</model-viewer>

<div id="info" class="info-card">
  閲覧モード
</div>

<script src="viewer.js"></script>

</body>

</html>
