<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D骨図鑑</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
</script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">
  🦴 3D骨図鑑（固定データ版）
</header>

<model-viewer
  id="viewer"
  src="model.glb"

  camera-controls
  ar

  exposure="0.55"
  shadow-intensity="1.2"
  environment-image="https://modelviewer.dev/shared-assets/environments/medieval_castle_1k.hdr"
  tone-mapping="neutral"
>
</model-viewer>

<!-- 左UI -->
<div id="panel" class="sidebar"></div>

<!-- 説明 -->
<div id="info" class="info-card">
  部位を選択してください
</div>

<script src="viewer.js"></script>

</body>

</html>
